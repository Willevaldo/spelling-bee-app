<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Bee Trainer - v2.0</title>
    
    <style>
        :root {
            --primary: #00796b;
            --secondary: #004d40;
            --accent: #ff9800;
            --bg: #e0f2f1;
            --white: #ffffff;
            --danger: #dc3545;
            --success: #28a745;
            --blue: #007bff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden;
        }
        
        /* Contenedores Principales */
        #pantalla-perfil, #menu-inicial, #selector-modo, #selector-dificultad-escritura, #canvas-app { 
            background: var(--white); 
            border-radius: 25px; 
            padding: 30px 25px; 
            box-shadow: 0 12px 24px rgba(0,0,0,0.1); 
            max-width: 600px; 
            margin: 20px auto; 
            display: none; /* Se controlará por JS */
        }

        /* Títulos e Iconos */
        h1 { color: var(--primary); font-size: 2.8em; margin-top: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.05); }
        h2 { color: var(--secondary); margin-bottom: 20px; }
        .emoji-grande { font-size: 3em; display: block; margin-bottom: 10px; }

        /* Estilo de Perfil */
        #input-nombre {
            width: 80%; padding: 15px; font-size: 20px; border-radius: 15px;
            border: 3px solid var(--bg); margin-bottom: 20px; text-align: center;
            outline: none; transition: border-color 0.3s;
        }
        #input-nombre:focus { border-color: var(--primary); }

        /* Botones de Grados y Tests */
        .contenedor-grado { background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 20px; padding: 20px; margin-bottom: 25px; }
        .btn-grado-completo { background: var(--success); color: white; font-size: 22px; font-weight: bold; padding: 18px; width: 100%; border-radius: 15px; border: none; margin-bottom: 15px; cursor: pointer; transition: 0.2s; }
        .btn-grado-completo:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .contenedor-tests { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .btn-test { background: #17a2b8; color: white; font-size: 16px; font-weight: bold; padding: 12px 22px; border-radius: 30px; border: none; cursor: pointer; flex-grow: 1; max-width: 160px; }

        /* --- UI DE ENTRENAMIENTO --- */
        
        /* Contenedor de Imagen FIJO para evitar saltos de UI */
        .contenedor-imagen-fijo {
            width: 100%;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            background: #fdfdfd;
            border-radius: 20px;
            border: 2px dashed #ccc;
            overflow: hidden;
        }

        #pistaImagen { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            border-radius: 10px;
            display: none; 
        }

        /* Input de Escritura Gigante (Sin cuadros vacíos) */
        #input-escritura {
            width: 90%;
            font-size: 48px;
            font-weight: bold;
            color: var(--primary);
            text-transform: uppercase;
            text-align: center;
            border: none;
            border-bottom: 5px solid var(--primary);
            background: transparent;
            margin: 20px 0;
            letter-spacing: 5px;
            outline: none;
            display: none; /* Solo en modo escribir */
        }

        /* Letras tipo "Scrabble" para Nivel 1 Escritura */
        #contenedor-letras-disponibles {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            min-height: 60px;
        }
        .letra-tile {
            width: 50px; height: 50px; background: white; border: 2px solid #ddd;
            border-radius: 10px; font-size: 24px; font-weight: bold; color: #333;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 0 #ccc; transition: 0.1s;
            user-select: none;
        }
        .letra-tile:active { transform: translateY(3px); box-shadow: 0 1px 0 #ccc; }
        .letra-tile.usada { opacity: 0.3; pointer-events: none; }

        /* Botones de Acción */
        .btn-principal { 
            width: 100%; max-width: 450px; padding: 22px; font-size: 26px; font-weight: bold;
            border: none; border-radius: 60px; background: var(--blue); color: white; cursor: pointer; 
            box-shadow: 0 8px 16px rgba(0, 123, 255, 0.3); transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .btn-principal:active { transform: scale(0.98); }
        .btn-principal:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        .btn-grabar { background: var(--danger); animation: latido 1.5s infinite; }
        
        #resultado { margin-top: 20px; font-size: 34px; font-weight: bold; min-height: 45px; }
        #estado { margin-bottom: 15px; color: #666; font-size: 1.2em; min-height: 30px; }
        #score-container { font-size: 30px; font-weight: 900; margin-bottom: 15px; color: var(--accent); display: none; }

        /* Auditoría y Datos (Para el entrenamiento) */
        .contenedor-auditoria { margin-top: 25px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-secundario { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; }
        #btn-deletré-bien { background: var(--accent); color: white; display: none; } /* Rescate de audio */

        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
        .btn-volver { margin-top: 40px; background: none; border: none; color: #999; font-size: 16px; text-decoration: underline; cursor: pointer; padding: 10px; }
        
        #ai-status { font-size: 14px; color: var(--primary); font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- Busca esta línea en tu index.html y déjala así -->
<div id="version-display" style="position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: #999; background: rgba(255,255,255,0.7); padding: 2px 8px; border-radius: 10px; pointer-events: none; z-index: 1000;">Cargando...</div>

    <!-- 1. Pantalla de Perfil (Login Local) -->
    <div id="pantalla-perfil" style="display: block;">
        <span class="emoji-grande">🧑‍🚀</span>
        <h1>¡Hola!</h1>
        <p>¿Quién va a practicar hoy?</p>
        <input type="text" id="input-nombre" placeholder="Escribe tu nombre aquí..." spellcheck="false">
        <button id="btn-entrar" class="btn-principal" style="margin: 0 auto;">¡Comenzar! 🚀</button>
    </div>

    <!-- 2. Menú de Grados y Tests -->
    <div id="menu-inicial">
        <span class="emoji-grande">🐝</span>
        <h1>Spelling Bee</h1>
        <div id="ai-status">Iniciando sistema...</div>
        <p>Elige un nivel para practicar</p>
        <div id="lista-grados"></div>
    </div>

    <!-- 3. Selector de Modo (Hablar o Escribir) -->
    <div id="selector-modo">
        <span class="emoji-grande">🛠️</span>
        <h2>¿Cómo quieres practicar?</h2>
        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <button id="btn-modo-hablar" class="btn-principal" style="background: var(--danger);">🎤 Usar mi Voz</button>
            <button id="btn-modo-escribir" class="btn-principal" style="background: var(--blue);">⌨️ Escribir</button>
        </div>
        <button class="btn-volver" onclick="location.reload()">⬅️ Cambiar de test</button>
    </div>

    <!-- 4. Selector de Dificultad Escritura -->
    <div id="selector-dificultad-escritura">
        <span class="emoji-grande">✏️</span>
        <h2>Nivel de Escritura</h2>
        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <button id="btn-escribir-n1" class="btn-principal">🧩 Nivel 1: Con pistas</button>
            <button id="btn-escribir-n2" class="btn-principal" style="background: var(--secondary);">🧠 Nivel 2: Experto</button>
        </div>
        <button class="btn-volver" onclick="location.reload()">⬅️ Volver</button>
    </div>

    <!-- 5. Canvas Principal de la App -->
    <div id="canvas-app">
        <div id="score-container">⭐ Puntos: <span id="puntaje">0</span></div>
        
        <!-- Contenedor Fijo para la imagen -->
        <div class="contenedor-imagen-fijo">
            <img id="pistaImagen" src="" alt="Pista visual">
        </div>

        <div id="estado">¡Prepárate!</div>

        <!-- UI ESPECÍFICA DE ESCRITURA (Centrada y Grande) -->
        <input type="text" id="input-escritura" placeholder="..." spellcheck="false" autocomplete="off">
        <div id="contenedor-letras-disponibles"></div>

        <!-- Botón Principal (Hablar / Enviar) -->
        <div style="display: flex; justify-content: center;">
            <button id="accionBtn" class="btn-principal" disabled>CARGANDO...</button>
        </div>

        <div id="resultado"></div>

        <div class="contenedor-auditoria">
            <!-- Botón de Rescate de Audio (Data Gathering) -->
            <button id="btn-deletré-bien" class="btn-secundario">✨ ¡Lo deletré bien! (Guardar)</button>
            
            <button id="btnLog" class="btn-secundario" style="background: #6f42c1; color: white;">📝 Error</button>
            <button id="btnExport" class="btn-secundario" style="background: #343a40; color: white;">📋 Reporte</button>
        </div>
        
        <button class="btn-volver" onclick="location.reload()">⬅️ Volver al menú</button>
    </div>

    <!-- Carga de Librerías y Scripts Core -->
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        window.whisperPipeline = pipeline;
        window.dispatchEvent(new Event('IA_Library_Ready'));
    </script>

    <script src="version.js"></script>
    <script src="datos.js"></script>
    
    <script>
        // 1. Definir esTablet PRIMERO para que core.js lo pueda ver
        window.esTablet = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    </script>

    <script src="core.js"></script>
    
    <script>
        // 2. Cargar el motor de voz correspondiente
        const motorScript = document.createElement('script');
        motorScript.src = window.esTablet ? "app_tablet.js" : "app_pc.js";
        document.body.appendChild(motorScript);
    </script>
</body>
</html>
