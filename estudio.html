<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio de Grabación (Dataset Builder)</title>
    <style>
        /* Animación de parpadeo y resalte de color */
        @keyframes alertaParpadeo {
            0% { opacity: 1; color: #dc3545; text-shadow: 0px 0px 15px rgba(220, 53, 69, 0.6); transform: scale(1); }
            50% { opacity: 0.7; color: #a71d2a; text-shadow: none; transform: scale(1.02); }
            100% { opacity: 1; color: #dc3545; text-shadow: 0px 0px 15px rgba(220, 53, 69, 0.6); transform: scale(1); }
        }

        .codigo-destacado {
            font-size: 3rem;
            font-weight: 900;
            display: block;
            animation: alertaParpadeo 1.5s infinite;
            border-bottom: 3px dashed #ccc;
            padding-bottom: 15px;
            margin-bottom: 15px;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div id="pantalla-configuracion" style="padding: 20px; font-family: sans-serif;">
        <h2>🎤 Configuración de Sesión</h2>
        
        <label>Locutor:</label>
        <select id="select-nino" style="margin-bottom: 20px; padding: 5px; font-size: 1.2rem;">
            <option value="nino1">Niño 1</option>
            <option value="nino2">Niño 2</option>
            <option value="nino3">Niño 3</option>
            <option value="nino4">Niño 4</option>
            <option value="nino5">Niño 5</option>
            <option value="nino6">Niño 6</option>
        </select>
        <br>

        <label>Bloque de Instrucción (Fase):</label>
        <select id="select-bloque" style="margin-bottom: 20px; padding: 5px; font-size: 1.2rem;">
            <option value="0">Fase 1 (Primera instrucción)</option>
            <option value="1">Fase 2 (Segunda instrucción)</option>
            <option value="2">Fase 3 (Tercera instrucción)</option>
            <option value="3">Fase 4 (Cuarta instrucción)</option>
        </select>
        <br>

        <label>Comenzar desde la palabra:</label>
        <select id="select-palabra" style="margin-bottom: 20px; padding: 5px; font-size: 1.2rem;"></select>
        <br>

        <button id="btn-iniciar-sesion" style="padding: 15px 30px; font-size: 1.2rem; background: #000; color: #fff; cursor: pointer;">
            COMENZAR SESIÓN
        </button>
    </div>

    <div id="pantalla-estudio" style="display: none; padding: 20px; font-family: sans-serif;">
        <h1 id="palabra-display" style="font-size: 6rem; text-align: center; margin-bottom: 10px;">PALABRA</h1>
        
        <div id="instruccion-display" style="background: #f4f4f4; border: 2px solid #ccc; padding: 20px; text-align: center; margin: 20px auto; width: 80%; border-radius: 10px;">
            <span id="codigo-activo-display" class="codigo-destacado">CÓDIGO: N/A</span>
            <strong style="font-size: 1.5rem;">Instrucciones de Producción:</strong> <br>
            <div id="texto-tev" style="color: #0056b3; margin-top: 15px;">N/A</div>
        </div>

        <div style="display: flex; gap: 20px; justify-content: center; margin-top: 40px;">
            <button id="btn-accion-principal" style="padding: 20px 40px; font-size: 1.5rem; width: 400px; cursor: pointer; border: none; border-radius: 10px; color: white;">
                ▶️ REPRODUCIR Y GRABAR
            </button>
            <button id="btn-regrabar" style="padding: 20px 40px; font-size: 1.5rem; width: 400px; display: none; background: #dc3545; color: white; cursor: pointer; border: none; border-radius: 10px;">
                🔄 VOLVER A GRABAR
            </button>
        </div>
    </div>

    <script src="dataset.js"></script>
    <script src="estudio.js"></script>
</body>
</html>
